<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CoffeeScript Caf&eacute;</title>
    <script type="module" src="./scripts/login.js"></script>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body class="auth-page">
    <h1>CoffeeScript Caf&eacute;</h1>
    <div class="auth-panel">
        <h2>Login</h2>
        <form>
            <fieldset>
                <label>Email</label>
                <input type="text" id="email-input">
            </fieldset>

            <fieldset>
                <label>Password</label>
                <input type="password" id="password-input" minlength="8" required>
            </fieldset>
            <p id="message"></p>
            <input type="submit" id="login-btn" class="light-btn btn2"value="Login">
            <p>Don't have an account? <a href="./pages/register.html">Register</a> now!</p>
        </form>
    </div>
</body>
</html>
