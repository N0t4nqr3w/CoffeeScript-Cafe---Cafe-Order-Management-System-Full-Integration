<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders | CoffeeScript Caf&eacute;</title>
    <script type="module" src="../scripts/manageOrders.js"></script>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/menuItems.css">
</head>
<body>
    <header>
        <div>
            <h1>CoffeeScript Caf&eacute;</h1>
             <button id="return-btn" class="dark-btn btn1">Dashboard</button>
        </div>
    </header>
    <main>
        <h2>Manage Orders</h2>
 
        <div class="filter-panel">
            <select id="filter-status">
                <option value="">All Statuses</option>
                <option>In Progress</option>
                <option>Completed</option>
                <option>Canceled</option>
            </select>
            <select id="filter-sort">
                <option value="">Sort: Default</option>
                <option value="cost">Sort: By Cost</option>
            </select>
            <button id="filter-btn" class="dark-btn btn-add">Filter</button>
        </div>
 
        <p id="orders-message"></p>
        <ul id="orders-list"></ul>
    </main>
</body>
</html>
