<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeScript Café - Place Order</title>
    
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <header class="cafe-header">
        <h1>CoffeeScript Café</h1>
    </header>

    <div class="container">
        
        <main>
            <h2>Menu Options</h2>
            <div class="menu-grid" id="menuGrid"></div>
        </main>

        
        <aside class="cart-panel">
            <h2>Your Order</h2>
            <div id="cartItems">
                <p class="empty-message">Your cart is empty.</p>
            </div>

            <div class="cart-total">
                <span>Total:</span>
                <span id="totalPrice">$0.00</span>
            </div>

            
            <form action="/orders" method="POST" id="orderForm">
                
                <input type="hidden" name="baristaId" value="65f1a2b3c4d5e6f7a8b90123">
                <input type="hidden" name="createdBy" value="65f2b3c4d5e6f7a8b901234c">
                <input type="hidden" name="status" value="In Progress">

                <div id="hiddenInputsContainer"></div>

                <button type="submit" class="btn-submit" id="submitBtn">Place Order</button>
            </form>
        </aside>
    </div>

    <script src="../scripts/api.js"></script>
</body>
</html>
