<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeScript Café - Place Order</title>
    
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <header>
    <div class="cafe-header">
      <h1>CoffeeScript Caf&eacute;</h1>
      <button id="return-btn" class="dark-btn btn1">Dashboard</button>
    </div>
  </header>

    <div class="container">
        
        <main>
            
            <h2>Menu Options</h2>
            <div class="menu-grid" id="menuGrid"></div>
        </main>

        
        <aside class="cart-panel">
            <h2>Your Order</h2>
            <div id="cartItems">
                <p class="empty-message">Your cart is empty.</p>
            </div>

            <div class="cart-total">
                <span>Total:</span>
                <span id="totalPrice">0</span>
            </div>
                


            <button class="btn-submit" id="submitBtn">Place Order</button>
        </aside> 
    </div> 

    <script src="../scripts/menuDisplay.js" type="module"></script> <!-- some kind of javascript to pull menu item for display-->
</body>
</html>
